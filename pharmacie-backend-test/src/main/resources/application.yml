server:
  port: ${SERVER_PORT:9090}
  servlet:
    session:
      # Durée d'un poste de travail plutôt que le défaut (30 min) — la session HTTP porte l'identité
      # PharmacoreSession (titulaire/pharmacien/caissier), pas juste un panier de démo.
      timeout: 8h

spring:
  application:
    name: pharmacie-backend
  datasource:
    url: ${PHARMACORE_JDBC_URL:jdbc:postgresql://localhost:5432/pharmacore}
    username: ${PHARMACORE_DB_USER:pharmacore_app}
    password: ${PHARMACORE_DB_PASSWORD:pharmacore_app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

# Configuration du client Business Core (BCaaS).
# CLIENT_ID/API_KEY ne sont JAMAIS commités — fournis via variables d'environnement (.env.local, gitignoré).
pharmacore:
  bcaas:
    base-url: ${BCAAS_BASE_URL:http://localhost:8081}
    client-id: ${BCAAS_CLIENT_ID:}
    api-key: ${BCAAS_API_KEY:}
    type-id: ${BCAAS_TYPE_ID:}
    version-number: ${BCAAS_VERSION_NUMBER:1}
    business-id: ${BCAAS_BUSINESS_ID:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
