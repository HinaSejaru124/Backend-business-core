openapi: 3.1.0
info:
  title: Business Core API
  version: "1.0.0"
  description: |
    API du Business Core — noyau métier générique intégré au kernel RT-Comops.

    Le Business Core expose un modèle de métier piloté par les métadonnées :
    le développeur déclare des Types Métier (le modèle), crée des Entreprises
    (les instances), et déclenche des Opérations. Le Business Core orchestre
    le kernel en façade.

    ## Authentification
    Chaque requête porte la clé Business Core du développeur via les en-têtes
    `X-BC-Client-Id` et `X-BC-Api-Key`. Le secret kernel n'est jamais exposé.

    ## Conventions
    - Versionnement de l'API dans l'URL (`/v1`), distinct de la version d'un Type Métier.
    - Opérations synchrones par défaut (`200`), différées en `202` avec une trace de suivi.
    - Erreurs au format RFC 7807 (Problem Details), enrichies de champs métier.
  contact:
    name: Équipe Business Core
  license:
    name: Usage académique

servers:
  - url: https://business-core.example.com
    description: Serveur du Business Core

security:
  - BusinessCoreKey: []

tags:
  - name: Accès
    description: Inscription et gestion des clés d'API
  - name: Types métier
    description: Déclaration du modèle métier (niveau Type)
  - name: Contenu de version
    description: Offres, rôles, règles, opérations et configuration d'une version
  - name: Entreprises
    description: Instances de métier (niveau Entreprise)
  - name: Opérations
    description: Exécution des actes métier
  - name: Consultation
    description: Transactions et traces

paths:
  /v1/registration:
    post:
      tags: [Accès]
      summary: Inscrire un développeur
      description: Crée un compte développeur et provisionne en coulisse une ClientApplication kernel dédiée. Renvoie la clé Business Core.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationRequest'
      responses:
        '201':
          description: Développeur inscrit, clé émise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '422':
          $ref: '#/components/responses/Problem'

  /v1/api-keys:
    get:
      tags: [Accès]
      summary: Lister ses clés actives
      responses:
        '200':
          description: Liste des clés
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiKeyInfo'

  /v1/api-keys:rotate:
    post:
      tags: [Accès]
      summary: Régénérer la clé (rotation du secret)
      responses:
        '200':
          description: Nouvelle clé émise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'

  /v1/business-types:
    post:
      tags: [Types métier]
      summary: Créer un type métier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusinessType'
      responses:
        '201':
          description: Type créé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessType'
        '422':
          $ref: '#/components/responses/Problem'
    get:
      tags: [Types métier]
      summary: Lister ses types métier
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Liste paginée des types
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBusinessType'

  /v1/business-types/{typeId}:
    parameters:
      - $ref: '#/components/parameters/TypeId'
    get:
      tags: [Types métier]
      summary: Consulter un type
      responses:
        '200':
          description: Le type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessType'
        '404':
          $ref: '#/components/responses/Problem'

  /v1/business-types/{typeId}/versions:
    parameters:
      - $ref: '#/components/parameters/TypeId'
    post:
      tags: [Types métier]
      summary: Publier une nouvelle version figée
      description: Crée une version immuable. Les entreprises existantes restent sur leur version (épinglage).
      responses:
        '201':
          description: Version publiée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeVersion'
    get:
      tags: [Types métier]
      summary: Lister les versions
      responses:
        '200':
          description: Liste des versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TypeVersion'

  /v1/business-types/{typeId}/versions/{versionNumber}:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    get:
      tags: [Types métier]
      summary: Consulter une version et son contenu
      responses:
        '200':
          description: La version avec ses sous-ressources
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TypeVersionDetail'

  /v1/business-types/{typeId}/versions/{versionNumber}/offers:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    post:
      tags: [Contenu de version]
      summary: Déclarer une définition d'offre
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOffer'
      responses:
        '201':
          description: Offre déclarée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Offer'
    get:
      tags: [Contenu de version]
      summary: Lister les offres types
      responses:
        '200':
          description: Liste des offres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Offer'

  /v1/business-types/{typeId}/versions/{versionNumber}/roles:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    post:
      tags: [Contenu de version]
      summary: Déclarer un rôle métier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRole'
      responses:
        '201':
          description: Rôle déclaré
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Role'

  /v1/business-types/{typeId}/versions/{versionNumber}/rules:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    post:
      tags: [Contenu de version]
      summary: Déclarer une règle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRule'
      responses:
        '201':
          description: Règle déclarée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'

  /v1/business-types/{typeId}/versions/{versionNumber}/operations:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    post:
      tags: [Contenu de version]
      summary: Déclarer une opération et ses étapes
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOperation'
      responses:
        '201':
          description: Opération déclarée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Operation'

  /v1/business-types/{typeId}/versions/{versionNumber}/config:
    parameters:
      - $ref: '#/components/parameters/TypeId'
      - $ref: '#/components/parameters/VersionNumber'
    post:
      tags: [Contenu de version]
      summary: Définir un paramètre par défaut
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConfigParam'
      responses:
        '201':
          description: Paramètre défini
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigParam'

  /v1/businesses:
    post:
      tags: [Entreprises]
      summary: Créer une entreprise
      description: Instancie un Type Métier à une version donnée. L'entreprise reste épinglée à cette version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBusiness'
      responses:
        '201':
          description: Entreprise créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '422':
          $ref: '#/components/responses/Problem'
    get:
      tags: [Entreprises]
      summary: Lister les entreprises
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Liste paginée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageBusiness'

  /v1/businesses/{businessId}:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    get:
      tags: [Entreprises]
      summary: Consulter une entreprise
      responses:
        '200':
          description: L'entreprise
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'
        '404':
          $ref: '#/components/responses/Problem'

  /v1/businesses/{businessId}/lifecycle:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    put:
      tags: [Entreprises]
      summary: Changer le cycle de vie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LifecycleChange'
      responses:
        '200':
          description: Cycle de vie mis à jour
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Business'

  /v1/businesses/{businessId}/actors:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    post:
      tags: [Entreprises]
      summary: Rattacher un acteur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AttachActor'
      responses:
        '201':
          description: Acteur rattaché
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Actor'
    get:
      tags: [Entreprises]
      summary: Lister les acteurs
      responses:
        '200':
          description: Liste des acteurs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Actor'

  /v1/businesses/{businessId}/actors/{actorId}:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
      - $ref: '#/components/parameters/ActorId'
    delete:
      tags: [Entreprises]
      summary: Détacher un acteur
      description: Met fin à la période de validité du rattachement.
      responses:
        '204':
          description: Acteur détaché

  /v1/businesses/{businessId}/rules:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    post:
      tags: [Entreprises]
      summary: Ajouter une règle locale
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRule'
      responses:
        '201':
          description: Règle locale ajoutée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Rule'

  /v1/businesses/{businessId}/config/{key}:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
      - name: key
        in: path
        required: true
        schema:
          type: string
    put:
      tags: [Entreprises]
      summary: Surcharger un paramètre ajustable
      description: Échoue si le paramètre est verrouillé au niveau du Type.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfigValue'
      responses:
        '200':
          description: Paramètre surchargé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigParam'
        '409':
          $ref: '#/components/responses/Problem'

  /v1/businesses/{businessId}/operations:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    get:
      tags: [Opérations]
      summary: Lister les opérations disponibles
      responses:
        '200':
          description: Opérations de l'entreprise
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Operation'

  /v1/businesses/{businessId}/operations/{name}:execute:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
      - name: name
        in: path
        required: true
        description: Nom de l'opération à exécuter (ex. vente, reservation)
        schema:
          type: string
    post:
      tags: [Opérations]
      summary: Exécuter une opération
      description: |
        Déclenche un acte métier. Synchrone par défaut (`200` avec le résultat).
        Pour une opération différée, renvoie `202` avec une trace de suivi.
        Une règle bloquante renvoie `422` au format RFC 7807 enrichi.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Clé d'idempotence pour éviter les doublons
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteOperation'
      responses:
        '200':
          description: Opération terminée (immédiate)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationResult'
        '202':
          description: Opération acceptée, en cours (différée)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationPending'
        '422':
          description: Règle métier non respectée
          $ref: '#/components/responses/Problem'

  /v1/businesses/{businessId}/transactions:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    get:
      tags: [Consultation]
      summary: Historique des transactions
      description: Données lues du kernel à la demande (jamais dupliquées).
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Liste paginée des transactions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageTransaction'

  /v1/businesses/{businessId}/traces:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
    get:
      tags: [Consultation]
      summary: Lister les traces d'opération
      responses:
        '200':
          description: Liste des traces
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OperationTrace'

  /v1/businesses/{businessId}/traces/{traceId}:
    parameters:
      - $ref: '#/components/parameters/BusinessId'
      - name: traceId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Consultation]
      summary: Suivre une opération différée
      responses:
        '200':
          description: État de la trace
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationTrace'
        '404':
          $ref: '#/components/responses/Problem'

components:
  securitySchemes:
    BusinessCoreKey:
      type: apiKey
      in: header
      name: X-BC-Api-Key
      description: Clé d'API du développeur. Accompagnée de l'en-tête X-BC-Client-Id.

  parameters:
    TypeId:
      name: typeId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionNumber:
      name: versionNumber
      in: path
      required: true
      schema:
        type: integer
        minimum: 1
    BusinessId:
      name: businessId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ActorId:
      name: actorId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    Page:
      name: page
      in: query
      required: false
      schema:
        type: integer
        default: 0
        minimum: 0
    Size:
      name: size
      in: query
      required: false
      schema:
        type: integer
        default: 20
        maximum: 100

  responses:
    Problem:
      description: Erreur au format RFC 7807
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/Problem'

  schemas:
    Problem:
      type: object
      description: Détail d'erreur RFC 7807, enrichi de champs métier.
      properties:
        type:
          type: string
          example: /errors/regle-violee
        title:
          type: string
          example: Règle métier non respectée
        status:
          type: integer
          example: 422
        detail:
          type: string
          example: Un document ordonnance est requis pour cette vente.
        instance:
          type: string
          example: /v1/businesses/abc/operations/vente:execute
        violatedRule:
          type: string
          description: Code de la règle violée (extension métier)
        requiredAction:
          type: string
          enum: [BLOQUER, EXIGER, VALIDER, AJUSTER, ALERTER, DEROGER]
        requiredDocument:
          type: string

    RegistrationRequest:
      type: object
      required: [name, email]
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        planCode:
          type: string
          description: Plan d'abonnement souhaité

    ApiKeyResponse:
      type: object
      properties:
        clientId:
          type: string
        apiKey:
          type: string
          description: Secret affiché une seule fois
        plan:
          type: string

    ApiKeyInfo:
      type: object
      properties:
        clientId:
          type: string
        status:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateBusinessType:
      type: object
      required: [code, nom]
      properties:
        code:
          type: string
          example: PHARMACIE
        nom:
          type: string
          example: Pharmacie
        businessDomainId:
          type: string
          format: uuid
          description: Référence taxonomie kernel (optionnel)

    BusinessType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        code:
          type: string
        nom:
          type: string
        statut:
          type: string
          enum: [BROUILLON, PUBLIE, ARCHIVE]
        businessDomainId:
          type: string
          format: uuid

    TypeVersion:
      type: object
      properties:
        numero:
          type: integer
        immuable:
          type: boolean
        publieeLe:
          type: string
          format: date-time

    TypeVersionDetail:
      allOf:
        - $ref: '#/components/schemas/TypeVersion'
        - type: object
          properties:
            offers:
              type: array
              items:
                $ref: '#/components/schemas/Offer'
            roles:
              type: array
              items:
                $ref: '#/components/schemas/Role'
            rules:
              type: array
              items:
                $ref: '#/components/schemas/Rule'
            operations:
              type: array
              items:
                $ref: '#/components/schemas/Operation'

    CreateOffer:
      type: object
      required: [nom]
      properties:
        nom:
          type: string
          example: Médicament
        formePrix:
          type: string
          enum: [FIXE, GRATUIT, SUR_DEVIS]
        prix:
          type: number
        capacites:
          type: array
          items:
            type: string
            enum: [STOCKABLE, PLANIFIABLE, RESERVABLE, RECURRENT]

    Offer:
      allOf:
        - $ref: '#/components/schemas/CreateOffer'
        - type: object
          properties:
            id:
              type: string
              format: uuid

    CreateRole:
      type: object
      required: [code, categorie]
      properties:
        code:
          type: string
          example: pharmacien-responsable
        categorie:
          type: string
          enum: [OPERATEUR, BENEFICIAIRE]

    Role:
      allOf:
        - $ref: '#/components/schemas/CreateRole'
        - type: object
          properties:
            id:
              type: string
              format: uuid

    CreateRule:
      type: object
      required: [declencheur, effet]
      properties:
        declencheur:
          type: string
          example: AVANT_VENTE
        condition:
          type: string
          description: Condition déclarative (niveau 1 paramétré)
          example: "offre.categorie == 'ordonnance'"
        effet:
          type: string
          enum: [BLOQUER, EXIGER, VALIDER, AJUSTER, ALERTER, DEROGER]
        rolesAutorisesADeroger:
          type: array
          items:
            type: string

    Rule:
      allOf:
        - $ref: '#/components/schemas/CreateRule'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            portee:
              type: string
              enum: [TYPE, ENTREPRISE]

    CreateOperation:
      type: object
      required: [nom, etapes]
      properties:
        nom:
          type: string
          example: vente
        roleDeclencheur:
          type: string
        etapes:
          type: array
          items:
            type: object
            properties:
              ordre:
                type: integer
              typeEtape:
                type: string
                example: ENREGISTRER_VENTE

    Operation:
      allOf:
        - $ref: '#/components/schemas/CreateOperation'
        - type: object
          properties:
            id:
              type: string
              format: uuid

    CreateConfigParam:
      type: object
      required: [cle, valeur]
      properties:
        cle:
          type: string
          example: devise
        valeur:
          type: string
          example: XAF
        verrouille:
          type: boolean
          default: false

    ConfigParam:
      allOf:
        - $ref: '#/components/schemas/CreateConfigParam'
        - type: object
          properties:
            id:
              type: string
              format: uuid
            portee:
              type: string
              enum: [TYPE, ENTREPRISE]

    ConfigValue:
      type: object
      required: [valeur]
      properties:
        valeur:
          type: string

    CreateBusiness:
      type: object
      required: [typeId, versionNumber, nom]
      properties:
        typeId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        nom:
          type: string
          example: Pharmacie du Centre
        organizationId:
          type: string
          format: uuid
          description: Référence Organization kernel (créée si absente)

    Business:
      type: object
      properties:
        id:
          type: string
          format: uuid
        nom:
          type: string
        typeId:
          type: string
          format: uuid
        versionNumber:
          type: integer
        organizationId:
          type: string
          format: uuid
        cycleVie:
          type: string
          enum: [ACTIVE, SUSPENDUE, FERMEE]

    LifecycleChange:
      type: object
      required: [cycleVie]
      properties:
        cycleVie:
          type: string
          enum: [ACTIVE, SUSPENDUE, FERMEE]

    AttachActor:
      type: object
      required: [roleCode, acteurKernelId]
      properties:
        roleCode:
          type: string
        acteurKernelId:
          type: string
          format: uuid
          description: Référence Actor (opérateur) ou Tiers (bénéficiaire) kernel
        valideDepuis:
          type: string
          format: date

    Actor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        roleCode:
          type: string
        categorie:
          type: string
          enum: [OPERATEUR, BENEFICIAIRE]
        acteurKernelId:
          type: string
          format: uuid
        valideDepuis:
          type: string
          format: date
        valideJusqua:
          type: string
          format: date

    ExecuteOperation:
      type: object
      description: Entrées de l'opération (payload métier).
      properties:
        parametres:
          type: object
          additionalProperties: true
          description: Paramètres propres à l'opération (offre, quantité, bénéficiaire...)
      example:
        parametres:
          offreId: "a1b2"
          quantite: 2
          beneficiaireId: "c3d4"

    OperationResult:
      type: object
      properties:
        statut:
          type: string
          enum: [COMPLETEE]
        transactionId:
          type: string
          description: Référence de la transaction kernel produite
        traceId:
          type: string
          format: uuid
        details:
          type: object
          additionalProperties: true

    OperationPending:
      type: object
      properties:
        statut:
          type: string
          enum: [EN_COURS]
        traceId:
          type: string
          format: uuid
        suivi:
          type: string
          description: URL de suivi de la trace
          example: /v1/businesses/abc/traces/trace-4410

    OperationTrace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        operationNom:
          type: string
        cleIdempotence:
          type: string
        transactionKernelId:
          type: string
          format: uuid
        statut:
          type: string
          enum: [EN_COURS, COMPLETEE, COMPENSEE]
        creeLe:
          type: string
          format: date-time
        resoluLe:
          type: string
          format: date-time

    Transaction:
      type: object
      description: Vue lue du kernel (non stockée par le Business Core).
      properties:
        transactionKernelId:
          type: string
          format: uuid
        montant:
          type: number
        devise:
          type: string
        statut:
          type: string
        date:
          type: string
          format: date-time

    PageInfo:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer

    PageBusinessType:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/BusinessType'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    PageBusiness:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Business'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'

    PageTransaction:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/Transaction'
        pageInfo:
          $ref: '#/components/schemas/PageInfo'
