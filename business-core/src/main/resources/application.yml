spring:
  application:
    name: business-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  r2dbc:
    url: ${BC_R2DBC_URL:r2dbc:postgresql://localhost:5432/businesscore}
    username: ${BC_DB_APP_USER:bc_app}
    password: ${BC_DB_APP_PASSWORD:bc_app}
    pool:
      initial-size: 5
      max-size: 20
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: ${BC_JDBC_URL:jdbc:postgresql://localhost:5432/businesscore}
    user: ${BC_DB_OWNER_USER:bc_owner}
    password: ${BC_DB_OWNER_PASSWORD:bc_owner}
  data:
    redis:
      host: ${BC_REDIS_HOST:localhost}
      port: ${BC_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security:
      protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:}
    properties:
      sasl.mechanism: ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:}
      sasl.jaas.config: ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}

server:
  forward-headers-strategy: framework

businesscore:
  kernel:
    base-url: ${KERNEL_BASE_URL:https://kernel-core.yowyob.com}
    client-id: ${KERNEL_CLIENT_ID:prod-platform-backend}
    client-secret: ${KERNEL_CLIENT_SECRET:VbWi225xzYPoD8rQ2FRniTAqkylh34XYeWxa9HCU}
    organization-service: ${KERNEL_ORGANIZATION_SERVICE:ORGANIZATION}
    business-actor-role: ${KERNEL_BUSINESS_ACTOR_ROLE:OWNER}
    timeout-ms: 5000
    max-retries: 2
  auth:
    tenant-id: ${KERNEL_TENANT_ID:}
    issuer: ${KERNEL_ISSUER:}
    jwks-uri: ${KERNEL_JWKS_URI:}
  security:
    encryption-key: ${BC_ENCRYPTION_KEY:}
    cors:
      allowed-origins: ${BC_CORS_ORIGINS:*}
  events:
    topic-prefix: business-core
  billing:
    # Quota mensuel de requêtes par plan (quota-mensuel < 0 => illimité).
    # Prix/paiement réels gérés par Kernel Core (indisponible) ; ici seul le quota est appliqué.
    plans:
      FREE:
        quota-mensuel: 1000
      PRO:
        quota-mensuel: 100000
      ENTERPRISE:
        quota-mensuel: -1

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.yowyob.businesscore: ${BC_LOG_LEVEL:DEBUG}

---
spring:
  config:
    activate:
      on-profile: dev
businesscore:
  security:
    encryption-key: ${BC_ENCRYPTION_KEY:dev-only-insecure-key-change-me-32b}

---
spring:
  config:
    activate:
      on-profile: test
  liquibase:
    enabled: true
businesscore:
  kernel:
    base-url: http://localhost:8089
  security:
    encryption-key: test-only-insecure-key-change-me-32