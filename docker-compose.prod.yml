# ============================================================================
#  docker-compose.prod.yml — Business Core sur l'infra yowyob
# ============================================================================
#  Va de pair avec .gitlab-ci.yml. Les SECRETS vont dans un fichier `.env` déposé
#  MANUELLEMENT sur le serveur dans le dossier du service (jamais commité).
#
#  Prérequis à demander à l'admin yowyob :
#    - une base PostgreSQL dédiée `businesscore` + un user dédié (non-superuser) ;
#    - une ClientApplication kernel PLATEFORME (KERNEL_CLIENT_ID/SECRET) ;
#    - un user Kafka dédié + ACLs (SASL/SCRAM) si l'émission d'événements est activée.
#
#  .env attendu sur le serveur :
#    APP_IMAGE (injecté par le CI), DB_PASSWORD, KERNEL_CLIENT_ID, KERNEL_CLIENT_SECRET,
#    BC_ENCRYPTION_KEY, KAFKA_PASSWORD (si Kafka SASL).
# ============================================================================
services:

  business-core:
    image: "${APP_IMAGE:?APP_IMAGE requis - construit par le CI}"
    container_name: business-core
    pull_policy: never                          # image construite localement par le CI
    restart: unless-stopped
    env_file: [.env]
    depends_on:
      - bc-redis
    environment:
      SERVER_PORT: "8080"
      SPRING_PROFILES_ACTIVE: "prod"
      # --- PostgreSQL : base dédiée, un seul user (owner non-superuser -> RLS FORCE s'applique) ---
      SPRING_R2DBC_URL: "r2dbc:postgresql://database:5432/businesscore"
      SPRING_R2DBC_USERNAME: "businesscore"
      SPRING_R2DBC_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD requis dans .env}"
      SPRING_LIQUIBASE_URL: "jdbc:postgresql://database:5432/businesscore"
      SPRING_LIQUIBASE_USER: "businesscore"
      SPRING_LIQUIBASE_PASSWORD: "${DB_PASSWORD:?DB_PASSWORD requis dans .env}"
      # --- Redis (cache JWT + idempotence) : service dédié ci-dessous ---
      SPRING_DATA_REDIS_HOST: "bc-redis"
      SPRING_DATA_REDIS_PORT: "6379"
      # --- kernel-core : hôte interne + ClientApplication plateforme du Business Core ---
      KERNEL_BASE_URL: "http://kernel-core-kernel-layer-1:8080"
      KERNEL_CLIENT_ID: "${KERNEL_CLIENT_ID:?requis dans .env}"
      KERNEL_CLIENT_SECRET: "${KERNEL_CLIENT_SECRET:?requis dans .env}"
      # --- Chiffrement des secrets kernel au repos (AES-256-GCM) ---
      BC_ENCRYPTION_KEY: "${BC_ENCRYPTION_KEY:?requis dans .env}"
      # --- Kafka (si besoin) : SASL/SCRAM, décommenter et fournir KAFKA_PASSWORD ---
      SPRING_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      # SPRING_KAFKA_SECURITY_PROTOCOL: "SASL_PLAINTEXT"
      # SPRING_KAFKA_PROPERTIES_SASL_MECHANISM: "SCRAM-SHA-256"
      # SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG: 'org.apache.kafka.common.security.scram.ScramLoginModule required username="business-core" password="${KAFKA_PASSWORD}";'
      # --- Path-routing Traefik : honorer X-Forwarded-Prefix (déjà actif via application.yml) ---
      SERVER_FORWARD_HEADERS_STRATEGY: "framework"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/actuator/health >/dev/null"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s
    labels:
      - "traefik.enable=true"
      # Un domaine, routage par chemin : backend sous /business-core-api
      - "traefik.http.routers.business-core.rule=Host(`business-core.yowyob.com`) && PathPrefix(`/business-core-api`)"
      - "traefik.http.routers.business-core.entrypoints=websecure"
      - "traefik.http.routers.business-core.tls=true"
      - "traefik.http.routers.business-core.tls.certresolver=letsencrypt"
      - "traefik.http.routers.business-core.priority=100"
      - "traefik.http.middlewares.business-core-strip.stripprefix.prefixes=/business-core-api"
      - "traefik.http.routers.business-core.middlewares=business-core-strip"
      - "traefik.http.services.business-core.loadbalancer.server.port=8080"
      - "traefik.docker.network=yowyob"
    networks:
      - yowyob

  # Cache dédié au Business Core (JWT kernel + verrous d'idempotence). Non exposé.
  bc-redis:
    image: redis:7
    container_name: business-core-redis
    restart: unless-stopped
    networks:
      - yowyob

networks:
  # Réseau partagé EXISTANT du serveur (Traefik / Postgres / Kafka / kernel-core).
  # NE PAS le recréer : il est external.
  yowyob:
    external: true
    name: yowyob
