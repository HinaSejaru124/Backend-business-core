services:
  business-core:
    build: .
    container_name: business-core
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      BC_DB_NAME: ${BC_DB_NAME:-businesscore}
      BC_DB_OWNER_PASSWORD: ${BC_DB_OWNER_PASSWORD}
      BC_DB_APP_PASSWORD: ${BC_DB_APP_PASSWORD}
      BC_R2DBC_URL: r2dbc:postgresql://localhost:5432/${BC_DB_NAME:-businesscore}
      BC_DB_APP_USER: bc_app
      BC_JDBC_URL: jdbc:postgresql://localhost:5432/${BC_DB_NAME:-businesscore}
      BC_DB_OWNER_USER: bc_owner
      BC_REDIS_HOST: localhost
      BC_REDIS_PORT: "6379"
      SPRING_KAFKA_BOOTSTRAP_SERVERS: localhost:9092
      KERNEL_BASE_URL: ${KERNEL_BASE_URL:-}
      KERNEL_CLIENT_ID: ${KERNEL_CLIENT_ID:-}
      KERNEL_CLIENT_SECRET: ${KERNEL_CLIENT_SECRET:-}
      BC_ENCRYPTION_KEY: ${BC_ENCRYPTION_KEY}
      BC_CORS_ORIGINS: ${BC_CORS_ORIGINS:-*}
      BC_ADMIN_EMAILS: ${BC_ADMIN_EMAILS:-}
    volumes:
      - bc-pgdata:/var/lib/postgresql/data
      - bc-kafkadata:/var/lib/kafka/data
      - bc-redisdata:/var/lib/redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      start_period: 90s
      retries: 12

volumes:
  bc-pgdata:
  bc-kafkadata:
  bc-redisdata:
