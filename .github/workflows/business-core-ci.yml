name: Business Core CI

on:
  push:
    branches: [develop2, main]
    paths:
      - "business-core/**"
      - ".github/workflows/business-core-ci.yml"
  pull_request:
    paths:
      - "business-core/**"
      - ".github/workflows/business-core-ci.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build et tests (compilation + RLS + témoin kernel)
        working-directory: business-core
        run: mvn -B verify
