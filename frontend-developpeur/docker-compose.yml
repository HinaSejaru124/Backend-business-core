# Lance uniquement le frontend développeur en conteneur.
# Le backend Business Core (backend-business-core/Dockerfile) est géré séparément.
#
# Usage :
#   docker compose up --build
#   → http://localhost:3000 (appelle le backend via NEXT_PUBLIC_API_BASE_URL)

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8081}
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped
