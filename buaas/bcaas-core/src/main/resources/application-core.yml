# ============================================================
# BCaaS Core — Configuration partagée
# Importée par toutes les applications consommatrices
# ============================================================

spring:
  # R2DBC — Base de données réactive
  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:buaas_db}
    username: ${DB_USER:buaas_user}
    password: ${DB_PASSWORD:buaas_secret_2024}
    pool:
      initial-size: 5
      max-size: 20
      max-idle-time: 30m
      validation-query: SELECT 1

  # Liquibase — Migrations
  liquibase:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:buaas_db}
    user: ${DB_USER:buaas_user}
    password: ${DB_PASSWORD:buaas_secret_2024}
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # Redis — Cache et sessions
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:redis_secret_2024}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 10
          max-idle: 5

  # Kafka — Messaging
  kafka:
    bootstrap-servers: ${KAFKA_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
    consumer:
      group-id: ${KAFKA_GROUP_ID:bcaas-core}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      enable-auto-commit: false

# BCaaS Core — Configuration spécifique
bcaas:
  tenant:
    cache-ttl-minutes: 30
  audit:
    enabled: true
    async: true
  kafka:
    topics:
      tenant-events: bcaas.tenant.events
      actor-events: bcaas.actor.events
      resource-events: bcaas.resource.events
      workflow-events: bcaas.workflow.events
      audit-events: bcaas.audit.events
