# ============================================================
# BuaaS Application — Configuration principale
# Couche 5 : Business Capabilities (Orientation professionnelle)
# ============================================================

spring:
  application:
    name: buaas-app

  # Base de données réactive (R2DBC)
  r2dbc:
    url: r2dbc:postgresql://localhost:5432/buaas_db
    username: buaas_user
    password: buaas_secret_2024
    pool:
      initial-size: 5
      max-size: 20

  # Liquibase (utilise JDBC pour les migrations)
  liquibase:
    url: jdbc:postgresql://localhost:5432/buaas_db
    user: buaas_user
    password: buaas_secret_2024
    change-log: classpath:db/changelog/db.changelog-master.xml
    enabled: true

  # Redis
  data:
    redis:
      host: localhost
      port: 6379
      password: redis_secret_2024

  # Kafka
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: buaas-app
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

# Serveur
server:
  port: 8080

# Actuator / Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    com.buaas: DEBUG
    com.bcaas: DEBUG
    org.springframework.r2dbc: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
