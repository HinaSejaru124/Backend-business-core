spring:
  application:
    name: business-core
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  r2dbc:
    url: ${BC_R2DBC_URL:r2dbc:postgresql://localhost:5432/businesscore}
    username: ${BC_DB_APP_USER:bc_app}
    password: ${BC_DB_APP_PASSWORD:bc_app}
    pool:
      initial-size: 5
      max-size: 20
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
    url: ${BC_JDBC_URL:jdbc:postgresql://localhost:5432/businesscore}
    user: ${BC_DB_OWNER_USER:bc_owner}
    password: ${BC_DB_OWNER_PASSWORD:bc_owner}
  data:
    redis:
      host: ${BC_REDIS_HOST:localhost}
      port: ${BC_REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    security:
      protocol: ${SPRING_KAFKA_SECURITY_PROTOCOL:}
    properties:
      sasl.mechanism: ${SPRING_KAFKA_PROPERTIES_SASL_MECHANISM:}
      sasl.jaas.config: ${SPRING_KAFKA_PROPERTIES_SASL_JAAS_CONFIG:}

server:
  forward-headers-strategy: framework

businesscore:
  kernel:
    base-url: ${KERNEL_BASE_URL:https://kernel-core.yowyob.com}
    client-id: ${KERNEL_CLIENT_ID:}
    client-secret: ${KERNEL_CLIENT_SECRET:}
    organization-service: ${KERNEL_ORGANIZATION_SERVICE:ORGANIZATION}
    business-actor-role: ${KERNEL_BUSINESS_ACTOR_ROLE:OWNER}
    # 15s : le kernel RT-Comops a une latence variable observée jusqu'à ~9-10s sous charge (mesuré
    # empiriquement le 12/07/2026 sur /api/auth/discover-contexts) ; 5s provoquait des échecs de
    # connexion intermittents sur des comptes pourtant valides.
    timeout-ms: 15000
    max-retries: 2
  auth:
    tenant-id: ${KERNEL_TENANT_ID:}
    issuer: ${KERNEL_ISSUER:}
    jwks-uri: ${KERNEL_JWKS_URI:}
  security:
    encryption-key: ${BC_ENCRYPTION_KEY:}
    cors:
      allowed-origins: ${BC_CORS_ORIGINS:*}
  events:
    topic-prefix: business-core
  billing:
    # Quota mensuel de requêtes par plan (quota-mensuel < 0 => illimité).
    # prix-mensuel : montant facturé théorique (console admin). L'encaissement réel reste géré par
    # Kernel Core (indisponible) — la console admin distingue toujours « facturé » de « encaissé ».
    plans:
      FREE:
        quota-mensuel: 1000
        prix-mensuel: 0
        devise: XAF
      PRO:
        quota-mensuel: 100000
        prix-mensuel: 15000
        devise: XAF
      ENTERPRISE:
        quota-mensuel: -1
        prix-mensuel: 75000
        devise: XAF
  # Administrateurs de la plateforme Business Core (console admin). Un développeur dont l'e-mail figure
  # ici obtient l'accès admin après connexion normale — cf. AdminAccess. Vide = aucun admin.
  admin:
    emails: ${BC_ADMIN_EMAILS:}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    com.yowyob.businesscore: ${BC_LOG_LEVEL:DEBUG}

---
spring:
  config:
    activate:
      on-profile: dev
businesscore:
  security:
    encryption-key: ${BC_ENCRYPTION_KEY:dev-only-insecure-key-change-me-32b}

---
spring:
  config:
    activate:
      on-profile: test
  liquibase:
    enabled: true
businesscore:
  kernel:
    base-url: http://localhost:8089
  security:
    encryption-key: test-only-insecure-key-change-me-32