# ============================================================================
#  .gitlab-ci.yml — déploiement auto du Business Core (image all-in-one) sur yowyob
# ============================================================================
#  Push sur `main` => recopie des sources sur le serveur PUIS `docker compose build`
#  + `up -d` via SSH (runner local, pas de registry). L'image contient l'app ET ses
#  dépendances (PostgreSQL, Redis, Kafka) dans un seul conteneur — voir Dockerfile.
#
#  Variables GitLab requises (Settings > CI/CD, idéalement au niveau GROUPE) :
#    - SSH_KEY    : clé privée SSH de déploiement
#    - HOST_ADDR  : 173.212.216.20
#    - HOST_USER  : gi
#  + un runner avec le tag `kernel-core`.
#
#  Le `.env` (secrets, cf. .env.example) est déposé MANUELLEMENT sur le serveur dans $DEPLOY_DIR.
# ============================================================================

stages:
  - deploy

variables:
  GIT_DEPTH: "0"
  DEPLOY_DIR: "/home/gi/business-core"

# ── DEPLOY : recopie le compose puis (re)construit/relance le conteneur all-in-one
deploy:
  stage: deploy
  tags: [kernel-core]
  image: alpine:latest
  before_script:
    - which ssh-agent || apk add --no-cache openssh
    - eval $(ssh-agent -s)
    - echo "$SSH_KEY" | tr -d '\r' | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan "$HOST_ADDR" >> ~/.ssh/known_hosts 2>/dev/null
    - chmod 644 ~/.ssh/known_hosts
  script:
    # Le dépôt est la SOURCE DE VÉRITÉ : on recopie le Dockerfile + compose à chaque déploiement.
    - scp -o StrictHostKeyChecking=no Dockerfile docker-compose.yml "${HOST_USER}@${HOST_ADDR}:${DEPLOY_DIR}/"
    - scp -o StrictHostKeyChecking=no -r docker infra "${HOST_USER}@${HOST_ADDR}:${DEPLOY_DIR}/"
    - scp -o StrictHostKeyChecking=no pom.xml "${HOST_USER}@${HOST_ADDR}:${DEPLOY_DIR}/"
    - scp -o StrictHostKeyChecking=no -r src "${HOST_USER}@${HOST_ADDR}:${DEPLOY_DIR}/"
    - |
      ssh "${HOST_USER}@${HOST_ADDR}" "
        set -e
        cd '${DEPLOY_DIR}'
        docker compose build
        docker compose up -d
        docker compose ps
        docker image prune -f
      "
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
